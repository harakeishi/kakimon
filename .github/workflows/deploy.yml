name: Deploy to Managed Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_push:
        description: 'Force push to remote (use with caution)'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/public
          cp -r apps/web/dist/* deploy/public/
          cp deploy-server/index.js deploy/
          cp deploy-server/package.json deploy/
          cp deploy-server/package-lock.json deploy/
          cp deploy-server/.gitignore deploy/

      - name: Initialize deploy repo
        run: |
          cd deploy
          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy from ${{ github.sha }}"

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MC_SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: ssh-keyscan -H ssh.mc.lolipop.jp >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          cd deploy
          git remote add lolipop ssh://shy-thunder-4128@ssh.mc.lolipop.jp:22/
          git push --force lolipop main:master
